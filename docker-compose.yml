version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: student_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_123
      POSTGRES_DB: student_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - student_network

  # Node.js Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: student_management
      DB_USER: postgres
      DB_PASSWORD: postgres_password_123
      PORT: 5000
      JWT_SECRET: your_super_secret_jwt_key_change_this
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start
    networks:
      - student_network

volumes:
  postgres_data:

networks:
  student_network:
    driver: bridge
